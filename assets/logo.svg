<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 16" shape-rendering="crispEdges" role="img" aria-label="DSB — Designer OS">
  <title>DSB — DESIGNER_OS</title>
  <!-- transparent background -->
  <!-- D -->
  <g fill="#8aceff">
    <rect x="0" y="2" width="4" height="2"/>
    <rect x="0" y="4" width="2" height="8"/>
    <rect x="4" y="4" width="2" height="8"/>
    <rect x="0" y="12" width="4" height="2"/>
  </g>
  <!-- S (pink shadow) -->
  <g fill="#ff5577">
    <rect x="10" y="3" width="5" height="2"/>
    <rect x="9" y="5" width="2" height="2"/>
    <rect x="10" y="7" width="5" height="2"/>
    <rect x="14" y="9" width="2" height="2"/>
    <rect x="9" y="11" width="5" height="2"/>
  </g>
  <!-- S (cyan top layer, offset 1px up/left for chunky pixel shadow) -->
  <g fill="#8aceff">
    <rect x="9" y="2" width="5" height="2"/>
    <rect x="8" y="4" width="2" height="2"/>
    <rect x="9" y="6" width="5" height="2"/>
    <rect x="13" y="8" width="2" height="2"/>
    <rect x="8" y="10" width="5" height="2"/>
  </g>
  <!-- B (yellow) -->
  <g fill="#ffdd74">
    <rect x="18" y="2" width="5" height="2"/>
    <rect x="18" y="4" width="2" height="8"/>
    <rect x="22" y="4" width="2" height="2"/>
    <rect x="18" y="6" width="5" height="2"/>
    <rect x="22" y="8" width="2" height="4"/>
    <rect x="18" y="12" width="5" height="2"/>
  </g>
  <!-- separator dot -->
  <rect x="27" y="12" width="2" height="2" fill="#ff5577"/>
  <!-- OS tag (small) -->
  <g fill="#7fff9f">
    <rect x="32" y="6" width="3" height="2"/>
    <rect x="32" y="8" width="1" height="2"/>
    <rect x="34" y="8" width="1" height="2"/>
    <rect x="32" y="10" width="3" height="2"/>
    <rect x="37" y="6" width="3" height="2"/>
    <rect x="37" y="8" width="2" height="2"/>
    <rect x="38" y="10" width="2" height="2"/>
    <rect x="37" y="12" width="3" height="2"/>
  </g>
</svg>
