<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DESIGNER_OS_V1.0 // PORTFOLIO.EXE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
:root{--bg:#12121e;--cy:#8aceff;--yl:#ffdd74;--ink:#e8e8ff;--dim:#4a4a6a;--panel:#1a1a2e;--hot:#ff5577}
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
html,body{background:var(--bg);color:var(--ink);font-family:'Silkscreen',monospace;height:100vh;overflow:hidden}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.25) 0 2px,transparent 2px 4px);pointer-events:none;z-index:9999;mix-blend-mode:multiply}
body::after{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.7));pointer-events:none;z-index:9998}
.hud{position:fixed;top:0;left:0;right:0;height:36px;background:var(--panel);border-bottom:2px solid var(--cy);display:flex;align-items:center;padding:0 16px;font-family:'Press Start 2P';font-size:9px;z-index:100;gap:16px}
.hud .dot{width:8px;height:8px;background:var(--yl);box-shadow:0 0 8px var(--yl);animation:bk 1.2s infinite}
.hud .sep{color:var(--dim)}.hud .r{margin-left:auto;color:var(--cy)}
@keyframes bk{50%{opacity:.3}}
.side{position:fixed;top:36px;left:0;width:180px;bottom:0;background:var(--panel);border-right:2px solid var(--cy);padding:24px 14px;font-family:'Press Start 2P';font-size:8px;z-index:50}
.side h3{color:var(--yl);margin-bottom:14px}
.side a{display:block;color:var(--ink);text-decoration:none;padding:9px 10px;margin-bottom:4px;border-left:3px solid transparent;transition:.15s}
.side a:hover{background:#222238;border-left-color:var(--cy);color:var(--cy);transform:translateX(3px)}
.side a.active{background:#222238;border-left-color:var(--yl);color:var(--yl)}
.side .stat{margin-top:28px;padding-top:14px;border-top:1px dashed var(--dim);color:var(--dim);line-height:1.8}
.track{position:fixed;top:36px;left:180px;right:0;height:3px;background:#0a0a14;z-index:60}
.track .f{height:100%;background:var(--yl);box-shadow:0 0 8px var(--yl);transition:width .5s}
.stage{position:fixed;top:39px;left:180px;right:0;bottom:0;overflow:hidden;cursor:grab}
.stage.drag{cursor:grabbing}
.strip{display:flex;height:100%;will-change:transform;transition:transform .7s cubic-bezier(.2,.9,.2,1)}
.slide{flex:0 0 84vw;height:100%;display:flex;align-items:center;padding:50px 40px;gap:36px;position:relative}
.num{position:absolute;top:40px;left:40px;font-family:'Press Start 2P';font-size:10px;color:var(--dim);letter-spacing:2px}
.num b{color:var(--yl)}
.img{flex:1.3;height:72%;background:#0a0a14;border:3px solid var(--cy);overflow:hidden;position:relative;clip-path:polygon(0 12px,12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%);box-shadow:12px 12px 0 var(--panel),12px 12px 0 3px var(--hot);transition:.5s}
.slide.on .img{transform:translateY(-6px)}
.img img{width:100%;height:100%;object-fit:cover;filter:saturate(.7) contrast(1.05);transition:.7s;transform:scale(1.05)}
.slide.on .img img{filter:saturate(1.2) contrast(1.1);transform:scale(1)}
.img::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(138,206,255,.06) 3px 4px);pointer-events:none}
.tag{position:absolute;top:14px;left:14px;background:var(--bg);color:var(--yl);font-family:'Press Start 2P';font-size:8px;padding:7px 11px;border:2px solid var(--yl);z-index:2;letter-spacing:1px}
.info{flex:1;max-width:440px;opacity:0;transform:translateX(30px);transition:.7s .2s}
.slide.on .info{opacity:1;transform:translateX(0)}
.y{font-family:'Press Start 2P';font-size:8px;color:var(--cy);margin-bottom:12px;letter-spacing:2px}
.info h2{font-family:'Press Start 2P';font-size:34px;color:var(--ink);text-shadow:3px 3px 0 var(--hot),6px 6px 0 var(--yl);margin-bottom:18px;letter-spacing:2px;line-height:1.2}
.role{color:var(--yl);font-family:'Press Start 2P';font-size:8px;margin-bottom:16px;letter-spacing:1px}
.info p{font-size:14px;line-height:1.75;color:var(--dim);margin-bottom:18px}
.info p b{color:var(--cy)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.chip{background:#0a0a14;border:1px solid var(--cy);color:var(--cy);padding:5px 9px;font-family:'Press Start 2P';font-size:7px}
.cta{display:inline-block;background:transparent;border:2px solid var(--yl);color:var(--yl);font-family:'Press Start 2P';font-size:8px;padding:13px 20px;text-decoration:none;transition:.15s;cursor:pointer;letter-spacing:1px}
.cta:hover{background:var(--yl);color:var(--bg);transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--hot)}
.ctrl{position:fixed;bottom:28px;left:calc(50% + 90px);transform:translateX(-50%);display:flex;gap:12px;align-items:center;z-index:80;background:var(--panel);border:2px solid var(--cy);padding:10px 16px;clip-path:polygon(0 6px,6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%)}
.arw{background:transparent;border:2px solid var(--cy);color:var(--cy);font-family:'Press Start 2P';font-size:10px;width:34px;height:34px;cursor:pointer;transition:.15s}
.arw:hover:not(:disabled){background:var(--cy);color:var(--bg);transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--hot)}
.arw:disabled{opacity:.3;cursor:not-allowed}
.dots{display:flex;gap:8px;padding:0 10px}
.d2{width:10px;height:10px;background:#0a0a14;border:2px solid var(--cy);cursor:pointer;transition:.15s}
.d2.on{background:var(--yl);border-color:var(--yl);box-shadow:0 0 8px var(--yl)}
.cnt{font-family:'Press Start 2P';font-size:8px;color:var(--yl);padding:0 12px;border-left:1px dashed var(--dim);border-right:1px dashed var(--dim)}
.hint{position:fixed;top:60px;right:30px;font-family:'Press Start 2P';font-size:8px;color:var(--dim);z-index:70;animation:fade 5s forwards;animation-delay:4s}
@keyframes fade{to{opacity:0}}
@media(max-width:900px){.side{display:none}.stage,.track{left:0}.slide{flex-direction:column;padding:20px;gap:16px}.info h2{font-size:22px}.img{height:45%;flex:none;width:100%}.info{max-width:100%}.ctrl{left:50%}.hint{display:none}}
</style></head>
<body>

<div class="hud">
  <span class="dot"></span><span>DESIGNER_OS_V1.0</span>
  <span class="sep">//</span><span>PORTFOLIO.EXE</span>
  <span class="sep">//</span><span style="color:var(--yl)">FILM_STRIP.MODE</span>
  <span class="r" id="clk">00:00:00</span>
</div>

<div class="track"><div class="f" id="trk"></div></div>

<nav class="side">
  <h3>&gt; NAVIGATION</h3>
  <a href="index.html">[01] HOME</a>
  <a href="portfolio.html" class="active">[02] PORTFOLIO</a>
  <a href="about.html">[03] ABOUT</a>
  <a href="contact.html">[04] CONTACT</a>
  <div class="stat">USER: DSB<br>STATUS: ONLINE<br>MODE: REEL<br>FRAMES: 5</div>
</nav>

<div class="hint">&gt; DRAG / SCROLL / ◄ ►</div>

<div class="stage" id="stg"><div class="strip" id="strip"></div></div>

<div class="ctrl">
  <button class="arw" id="pv">◄</button>
  <div class="dots" id="dts"></div>
  <span class="cnt"><span id="cn">01</span> / <span id="tt">05</span></span>
  <button class="arw" id="nx">►</button>
</div>

<script>
const P=[
 {n:'01',cat:'BRAND CAMPAIGN',yr:'2025',img:'./images/sap1.png',title:'SAPPORO',role:'ART DIRECTION / PRINT',desc:'A bold integrated campaign for Sapporo Premium leaning into its <b>samurai legacy</b>. Visual system, OOH and tone of voice positioning it as the thinking drinker\'s lager.',chips:['Art Direction','Campaign','Print','Copy']},
 {n:'02',cat:'BRANDING',yr:'2024',img:'./images/Adcamp1-07.jpg',title:'DEPOP',role:'BRANDING / ADVERTISING',desc:'Reimagined Depop\'s youth-first energy into a <b>high-contrast print campaign</b> celebrating Gen-Z resellers. Hand-built typographic layouts fused thrift aesthetics with editorial polish.',chips:['Branding','Advertising','Typography']},
 {n:'03',cat:'INTEGRATED',yr:'2025',img:'./images/rc1.png',title:'RED CROSS',role:'INTEGRATED CAMPAIGN',desc:'<b>"Panic is Optional"</b> — emergency-preparedness spanning print, OOH, Reels and direct mail. Calm, reassuring design language built to cut through crisis noise.',chips:['Integrated','OOH','Social','DM']},
 {n:'04',cat:'EDITORIAL',yr:'2024',img:'./images/edim.png',title:'GAMESCOM',role:'EDITORIAL / EVENT BRANDING',desc:'An editorial-led identity for Gamescom exploring the <b>intersection of gaming and print</b>. Pixel systems, grids and loud typography collide.',chips:['Editorial','Event','Pixel']},
 {n:'05',cat:'WEB DESIGN',yr:'2025',img:'./images/webm.png',title:'BERKSHIRE',role:'WEB REDESIGN / HTML-CSS',desc:'Full-scale redesign concept for Berkshire Hathaway — bringing a storied, text-heavy site into a <b>modern, accessible design system</b> without losing its restraint.',chips:['Web','UX','HTML/CSS','System']}
];

let A;function sfx(f=440,d=.06){try{A=A||new(window.AudioContext||webkitAudioContext);const o=A.createOscillator(),g=A.createGain();o.type='square';o.frequency.value=f;g.gain.value=.04;o.connect(g);g.connect(A.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,A.currentTime+d);o.stop(A.currentTime+d)}catch(e){}}
setInterval(()=>clk.textContent=new Date().toTimeString().slice(0,8),1000);

const strip=document.getElementById('strip');
P.forEach(p=>{
  const s=document.createElement('div');s.className='slide';
  s.innerHTML=`<div class="num">FRAME <b>${p.n}</b> / 05</div><div class="img"><span class="tag">${p.cat}</span><img src="${p.img}" alt="${p.title}" loading="lazy"></div><div class="info"><div class="y">&gt; ${p.yr} // ${p.cat}</div><h2>${p.title}</h2><div class="role">${p.role}</div><p>${p.desc}</p><div class="chips">${p.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div><a href="#" class="cta">► VIEW CASE STUDY</a></div>`;
  strip.appendChild(s);
});

const dts=document.getElementById('dts');
P.forEach((_,i)=>{const d=document.createElement('div');d.className='d2';d.onclick=()=>go(i);dts.appendChild(d)});

let idx=0;const slides=document.querySelectorAll('.slide');
tt.textContent=String(P.length).padStart(2,'0');

function go(i){
  idx=Math.max(0,Math.min(P.length-1,i));
  const sw=window.innerWidth*.84;const off=(window.innerWidth-180-sw)/2;
  strip.style.transform=`translateX(${off - idx*sw}px)`;
  slides.forEach((s,j)=>s.classList.toggle('on',j===idx));
  document.querySelectorAll('.d2').forEach((d,j)=>d.classList.toggle('on',j===idx));
  cn.textContent=String(idx+1).padStart(2,'0');
  trk.style.width=((idx+1)/P.length*100)+'%';
  pv.disabled=idx===0;nx.disabled=idx===P.length-1;
  sfx(500+idx*80,.06);setTimeout(()=>sfx(700+idx*80,.04),60);
}
pv.onclick=()=>go(idx-1);nx.onclick=()=>go(idx+1);
addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(idx+1);if(e.key==='ArrowLeft')go(idx-1)});
let wt=0;stg.addEventListener('wheel',e=>{e.preventDefault();if(Date.now()-wt<700)return;wt=Date.now();go(idx+(e.deltaY>0||e.deltaX>0?1:-1))},{passive:false});
let sx=0,dg=false;
stg.addEventListener('mousedown',e=>{dg=true;sx=e.clientX;stg.classList.add('drag')});
addEventListener('mouseup',e=>{if(!dg)return;dg=false;stg.classList.remove('drag');const d=e.clientX-sx;if(Math.abs(d)>80)go(idx+(d<0?1:-1))});
stg.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});
stg.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-sx;if(Math.abs(d)>60)go(idx+(d<0?1:-1))});
addEventListener('resize',()=>go(idx));
setTimeout(()=>{go(0);sfx(440,.08);setTimeout(()=>sfx(660,.1),120);setTimeout(()=>sfx(880,.12),240)},250);
</script></body></html>
